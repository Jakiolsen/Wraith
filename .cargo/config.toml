# Cross-compilation configuration for the implant.
#
# Windows (from Linux):
#   rustup target add x86_64-pc-windows-gnu
#   apt install mingw-w64
#   cargo build --release --target x86_64-pc-windows-gnu -p implant
#
# Windows (MSVC, from Windows):
#   rustup target add x86_64-pc-windows-msvc
#   cargo build --release --target x86_64-pc-windows-msvc -p implant
#
# Linux x86_64 (native):
#   cargo build --release --target x86_64-unknown-linux-musl -p implant
#
# Build-time overrides for stageless implant:
#   WRAITH_C2_URL=https://redirector.example.com:443 \
#   WRAITH_CHECKIN_URI=/api/v1/update \
#   WRAITH_RESULT_URI=/api/v1/result \
#   cargo build --release --target x86_64-pc-windows-gnu -p implant

[target.x86_64-pc-windows-gnu]
linker = "x86_64-w64-mingw32-gcc"

[target.x86_64-unknown-linux-musl]
linker = "musl-gcc"
