syntax = "proto3";
package orchestrator;

service Orchestrator {
  rpc ListSessions    (Empty)               returns (SessionList);
  rpc TaskSession     (TaskRequest)         returns (TaskResponse);
  rpc ListSessionTasks(SessionTasksRequest) returns (SessionTaskList);
}

message Empty {}

message SessionSnapshot {
  string session_id  = 1;
  string hostname    = 2;
  string username    = 3;
  string os          = 4;
  string arch        = 5;
  string internal_ip = 6;
  string profile     = 7;
  string last_seen   = 8;
  bool   active      = 9;
}

message SessionList {
  repeated SessionSnapshot sessions = 1;
}

message TaskRequest {
  string session_id    = 1;
  string module        = 2;
  repeated string args = 3;
}

message TaskResponse {
  string task_id = 1;
}

message SessionTasksRequest {
  string session_id = 1;
}

message TaskResult {
  string          task_id     = 1;
  string          module      = 2;
  repeated string args        = 3;
  string          status      = 4;
  string          output_json = 5;
  string          queued_at   = 6;
}

message SessionTaskList {
  repeated TaskResult tasks = 1;
}
