---
- name: Install redirector firewall packages
  ansible.builtin.apt:
    name: ufw
    state: present
    update_cache: true

- name: Install NGINX stream proxy packages
  ansible.builtin.apt:
    name:
      - nginx
    state: present
    update_cache: true

- name: Build redirector blueprint set
  ansible.builtin.set_fact:
    wraith_redirector_effective_blueprints: >-
      {{
        wraith_redirector_blueprints
        if (wraith_redirector_blueprints | length > 0)
        else [
          {
            'name': 'agent-http',
            'listen': wraith_redirector_bind_agent_http,
            'balance': wraith_redirector_balance,
            'allowed_cidrs': wraith_redirector_allowed_agent_cidrs,
            'backends': wraith_redirector_agent_backends
          }
        ]
      }}

- name: Validate redirector blueprints are configured
  ansible.builtin.assert:
    that:
      - wraith_redirector_effective_blueprints | length > 0
      - item.name is defined
      - item.name | length > 0
      - item.listen is defined
      - item.listen | length > 0
      - item.backends is defined
      - item.backends | length > 0
      - item.allowed_cidrs is defined
      - item.allowed_cidrs | length > 0
    fail_msg: Each redirector blueprint requires name, listen, backends, and explicit allowed CIDRs.
  loop: "{{ wraith_redirector_effective_blueprints }}"
  loop_control:
    label: "{{ item.name }}"

- name: Install NGINX route blueprint config
  ansible.builtin.template:
    src: wraith-routes.conf.j2
    dest: /etc/nginx/conf.d/wraith-routes.conf
    owner: root
    group: root
    mode: "0644"
  notify: Restart NGINX

- name: Install dedicated NGINX config
  ansible.builtin.template:
    src: nginx.conf.j2
    dest: /etc/nginx/nginx.conf
    owner: root
    group: root
    mode: "0644"
  notify: Restart NGINX

- name: Reset UFW to a clean state
  ansible.builtin.command: ufw --force reset
  changed_when: true

- name: Set UFW default deny incoming
  ansible.builtin.command: ufw default deny incoming
  changed_when: true

- name: Set UFW default allow outgoing
  ansible.builtin.command: ufw default allow outgoing
  changed_when: true

- name: Allow SSH from approved CIDRs
  ansible.builtin.command:
    argv:
      - ufw
      - allow
      - from
      - "{{ item }}"
      - to
      - any
      - port
      - "22"
      - proto
      - tcp
  loop: "{{ wraith_admin_ssh_cidrs }}"
  changed_when: true

- name: Allow redirector listeners from approved CIDRs
  ansible.builtin.command:
    argv:
      - ufw
      - allow
      - from
      - "{{ item.1 }}"
      - to
      - any
      - port
      - "{{ item.0.listen | regex_replace('^.*:', '') }}"
      - proto
      - tcp
  loop: "{{ query('subelements', wraith_redirector_effective_blueprints, 'allowed_cidrs') }}"
  loop_control:
    label: "{{ item.0.name }} -> {{ item.1 }}"
  changed_when: true

- name: Enable UFW
  ansible.builtin.command: ufw --force enable
  changed_when: true

- name: Enable and start NGINX
  ansible.builtin.systemd:
    name: nginx
    enabled: true
    state: started
