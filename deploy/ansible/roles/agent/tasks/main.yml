---
- name: Install Rust toolchain for agent
  become_user: "{{ wraith_user }}"
  ansible.builtin.shell: |
    set -euo pipefail
    if [ ! -x "{{ wraith_cargo_bin }}" ]; then
      curl https://sh.rustup.rs -sSf | sh -s -- -y --profile minimal --default-toolchain stable
    fi
  args:
    executable: /bin/bash

- name: Upload repository to agent host
  ansible.builtin.copy:
    src: "{{ wraith_repo_src }}/"
    dest: "{{ wraith_install_dir }}/src/"
    owner: "{{ wraith_user }}"
    group: "{{ wraith_group }}"
    mode: preserve

- name: Build agent binary
  become_user: "{{ wraith_user }}"
  ansible.builtin.command:
    argv:
      - "{{ wraith_cargo_bin }}"
      - build
      - --release
      - -p
      - "{{ wraith_agent_build_target }}"
  args:
    chdir: "{{ wraith_install_dir }}/src"
  environment:
    CARGO_HOME: "{{ wraith_cargo_home }}"
    RUSTUP_HOME: "{{ wraith_rustup_root }}"

- name: Install agent binary
  ansible.builtin.copy:
    src: "{{ wraith_install_dir }}/src/target/release/agent"
    dest: "{{ wraith_install_dir }}/bin/agent"
    remote_src: true
    owner: "{{ wraith_user }}"
    group: "{{ wraith_group }}"
    mode: "0755"
  notify: Restart Wraith agent

- name: Write agent runtime config
  ansible.builtin.template:
    src: agent.json.j2
    dest: "{{ wraith_config_dir }}/agent.json"
    owner: "{{ wraith_user }}"
    group: "{{ wraith_group }}"
    mode: "0640"
  notify: Restart Wraith agent

- name: Install agent systemd unit
  ansible.builtin.template:
    src: wraith-agent.service.j2
    dest: /etc/systemd/system/wraith-agent.service
    owner: root
    group: root
    mode: "0644"
  notify:
    - Reload systemd
    - Restart Wraith agent

- name: Install agent environment file
  ansible.builtin.template:
    src: agent.env.j2
    dest: "{{ wraith_agent_env_file }}"
    owner: root
    group: "{{ wraith_group }}"
    mode: "0640"
  notify: Restart Wraith agent

- name: Enable and start agent service
  ansible.builtin.systemd:
    name: wraith-agent.service
    enabled: true
    state: started
