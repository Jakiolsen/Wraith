---
wraith_user: wraith
wraith_group: wraith

wraith_install_dir: /opt/wraith
wraith_config_dir: /etc/wraith
wraith_data_dir: /var/lib/wraith
wraith_log_dir: /var/log/wraith
wraith_cert_dir: /etc/wraith/certs

wraith_repo_src: "{{ playbook_dir }}/../.."
wraith_rustup_root: "/home/{{ wraith_user }}/.rustup"
wraith_cargo_home: "/home/{{ wraith_user }}/.cargo"
wraith_cargo_bin: "{{ wraith_cargo_home }}/bin/cargo"

wraith_control_plane_build_target: server
wraith_agent_build_target: agent

wraith_server_env_file: "{{ wraith_config_dir }}/server.env"
wraith_agent_env_file: "{{ wraith_config_dir }}/agent.env"
wraith_server_env: {}
wraith_agent_env: {}

wraith_server_grpc_addr: 0.0.0.0:50051
wraith_server_enrollment_addr: 0.0.0.0:5443
wraith_server_mtls_endpoint: "https://{{ wraith_public_server_name | default(inventory_hostname) }}:50051"
wraith_public_server_name: "{{ inventory_hostname }}"
wraith_server_listen_host: 0.0.0.0
wraith_tls_common_name: "{{ wraith_public_server_name }}"
wraith_server_cert_sans_dns:
  - "{{ wraith_public_server_name }}"
wraith_server_cert_sans_ip: []
wraith_ca_common_name: Wraith Deployment CA
wraith_ca_validity_days: 825
wraith_server_cert_validity_days: 365
wraith_server_tls_mode: self_signed
wraith_server_offline_ca: false
wraith_provided_ca_cert_src: ""
wraith_provided_ca_key_src: ""
wraith_provided_server_cert_src: ""
wraith_provided_server_key_src: ""

wraith_database_url: "sqlite://{{ wraith_data_dir }}/wraith_orchestrator.db"
wraith_server_catalog: []
wraith_enrollment_tokens: []
wraith_admin_ssh_cidrs: []
wraith_control_plane_allowed_grpc_cidrs: []
wraith_control_plane_allowed_https_cidrs: []
wraith_agent_auth_token: ""
wraith_wireguard_enabled: false
wraith_wireguard_interface: wg0
wraith_wireguard_listen_port: 51820
wraith_wireguard_server_address: 10.8.0.1/24
wraith_wireguard_server_private_key: ""
wraith_wireguard_allowed_cidrs:
  - 0.0.0.0/0
wraith_wireguard_peers: []

wraith_agent_listen_addr: 0.0.0.0:8088
wraith_agent_id: "{{ inventory_hostname }}"
wraith_agent_advertised_name: "{{ inventory_hostname }}"
wraith_agent_environment: default
wraith_agent_location: "{{ inventory_hostname }}"
wraith_agent_advertised_base_url: "http://{{ inventory_hostname }}:8088"
wraith_agent_control_plane_url: ""
wraith_agent_bootstrap_token: ""
wraith_agent_state_path: "{{ wraith_data_dir }}/agent.state.json"
wraith_agent_commands: []
wraith_agent_log_sources:
  application: /var/log/syslog
  audit: /var/log/auth.log

wraith_redirector_bind_agent_http: 0.0.0.0:8088
wraith_redirector_balance: roundrobin
wraith_redirector_agent_backends: []
wraith_redirector_allowed_agent_cidrs: []
wraith_redirector_blueprints: []
