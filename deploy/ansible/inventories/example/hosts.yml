---
all:
  children:
    control_planes:
      hosts:
        cp1.example.com:
          ansible_user: root
          wraith_public_server_name: cp1.example.com
          wraith_wireguard_enabled: true
          wraith_wireguard_server_private_key: replace-with-server-private-key
          wraith_wireguard_server_address: 10.8.0.1/24
          wraith_wireguard_allowed_cidrs:
            - 0.0.0.0/0
          wraith_wireguard_peers:
            - name: operator-laptop
              public_key: replace-with-operator-public-key
              allowed_ips:
                - 10.8.0.10/32
          wraith_admin_ssh_cidrs:
            - 198.51.100.10/32
            - 10.8.0.0/24
          wraith_control_plane_allowed_grpc_cidrs:
            - 10.8.0.0/24
          wraith_control_plane_allowed_https_cidrs:
            - 10.8.0.0/24
          wraith_server_cert_sans_dns:
            - cp1.example.com
          wraith_server_cert_sans_ip:
            - 203.0.113.10
          wraith_server_catalog:
            - id: edge-eu-01
              name: Edge EU 01
              environment: production
              location: Copenhagen
              base_url: http://10.0.30.31:8088
              redirector_token: replace-with-a-shared-redirector-token
              auth_token: replace-with-a-long-random-agent-token
              capabilities:
                - health_check
                - collect_metrics
                - fetch_logs
          wraith_enrollment_tokens:
            - label: enrollment-dev-operator
              token_hash: 0c9f59f6ef713246be9d0a613ce6c15ec8c7ecfc3ec44403dd48773bd9b1702b
              expires_at: "2027-04-18T00:00:00Z"
              single_use: true
              max_validity_days: 30
    agents:
      hosts:
        agent1.example.com:
          ansible_user: root
          wraith_agent_id: edge-eu-01
          wraith_agent_listen_addr: 0.0.0.0:8088
          wraith_agent_auth_token: replace-with-a-long-random-agent-token
          wraith_agent_log_sources:
            application: /var/log/syslog
            audit: /var/log/auth.log
    redirectors:
      hosts:
        redir1.example.com:
          ansible_user: root
          wraith_admin_ssh_cidrs:
            - 198.51.100.10/32
            - 10.8.0.0/24
          wraith_redirector_blueprints:
            - name: agent-http
              listen: 0.0.0.0:8088
              balance: least_conn
              auth_token: replace-with-a-shared-redirector-token
              allowed_cidrs:
                - 10.0.0.11/32
              proxy_set_headers:
                X-Wraith-Route: agent-http
              backends:
                - name: agent1
                  address: 10.0.10.21:8088
                - name: agent2
                  address: 10.0.10.22:8088
