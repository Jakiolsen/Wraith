services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: wraith
      POSTGRES_USER: wraith
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
    secrets:
      - postgres_password
    volumes:
      - pgdata:/var/lib/postgresql/data
    # No ports: — Postgres is unreachable from outside the Docker network
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wraith"]
      interval: 5s
      timeout: 3s
      retries: 10

  server:
    build:
      context: .
      dockerfile: docker/Dockerfile
    restart: unless-stopped
    # Bind to all container interfaces so Docker can forward the host-side ports below.
    # Host-side restriction (127.0.0.1:...) is enforced by the ports mapping, not here.
    command: ["wraith-server", "--grpc-addr", "0.0.0.0:50051", "--http-addr", "0.0.0.0:8080"]
    volumes:
      - /etc/localtime:/etc/localtime:ro
    depends_on:
      postgres:
        condition: service_healthy
    secrets:
      - postgres_password
      - redirector_token
      - ca_passphrase
    ports:
      - "127.0.0.1:8080:8080"    # HTTP  — implant check-ins (plain, host-only)
      - "127.0.0.1:50051:50051"  # gRPC  — operator client (mTLS, host-only)
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "test -f /proc/1/status"]
      interval: 10s
      timeout: 5s
      retries: 3

  redirector:
    build:
      context: .
      dockerfile: docker/Dockerfile.redirector
    restart: unless-stopped
    depends_on:
      server:
        condition: service_healthy
    secrets:
      - redirector_token
    ports:
      - "0.0.0.0:8443:8443"   # Implant-facing HTTP — exposed externally
    volumes:
      - ./profiles/examples:/profiles:ro
    command:
      - wraith-redirector
      - --listen
      - 0.0.0.0:8443
      - --profiles-dir
      - /profiles
      - --upstream
      - http://server:8080
    networks:
      - internal

secrets:
  postgres_password:
    file: ./secrets/postgres_password
  redirector_token:
    file: ./secrets/redirector_token
  ca_passphrase:
    file: ./secrets/ca_passphrase

networks:
  internal:
    driver: bridge

volumes:
  pgdata:
